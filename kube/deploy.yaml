apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: 737361577962.dkr.ecr.us-east-2.amazonaws.com/myrepo:latest
        ports:
        - containerPort: 80
