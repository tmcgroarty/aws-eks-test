apiVersion: v1
kind: Service
metadata:
  name: myapp-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: arn:aws:acm:us-east-2:737361577962:certificate/8813e5b2-85b7-4256-8a39-18b5515cb6be
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
spec:
  type: LoadBalancer
  selector:
    app: myapp
  ports:
    - name: https
      port: 443
      targetPort: 80
      protocol: TCP
